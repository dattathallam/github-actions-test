name: "Fetch Actions from Artifactory"
description: >
  Resolves each owner/repo@ref to a commit SHA via the GitHub API,
  downloads the action archive through an Artifactory generic remote
  repository, and extracts it to a local directory so subsequent steps
  can reference the action via a local path instead of a remote one.

inputs:
  rt-repo-url:
    description: >
      Full URL to the Artifactory remote repository, including the repo name.
      e.g. http://localhost:8083/artifactory/gh-actions/
           https://myorg.jfrog.io/artifactory/gh-remote/
    required: true
  rt-token:
    description: "Artifactory identity token (OIDC or API key). Used as Bearer auth. Takes precedence over rt-username/rt-password."
    required: false
    default: ""
  rt-username:
    description: "Artifactory username for Basic auth (used when rt-token is not set)"
    required: false
    default: ""
  rt-password:
    description: "Artifactory password for Basic auth (used when rt-token is not set)"
    required: false
    default: ""
  gh-token:
    description: "GitHub token used to resolve branch/tag refs to commit SHAs"
    required: true
  actions:
    description: |
      Newline-separated list of actions to prefetch.
      Each entry must be in owner/repo@ref format, e.g.:
        the-pr-agent/pr-agent@v1
        actions/checkout@v4
        my-org/my-private-action@main
    required: true
  output-dir:
    description: "Runner-local directory where action sources are written"
    required: false
    default: "jfrog-proxy"

outputs:
  output-dir:
    description: "Absolute path to the directory containing fetched actions"
    value: ${{ steps.fetch.outputs.output-dir }}

runs:
  using: "composite"
  steps:
    - name: Fetch and extract actions
      id: fetch
      shell: python3 {0}
      env:
        RT_REPO_URL:  ${{ inputs.rt-repo-url }}
        RT_TOKEN:     ${{ inputs.rt-token }}
        RT_USERNAME:  ${{ inputs.rt-username }}
        RT_PASSWORD:  ${{ inputs.rt-password }}
        GH_TOKEN:     ${{ inputs.gh-token }}
        ACTIONS_LIST: ${{ inputs.actions }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
      run: |
        import os
        import sys
        import tarfile
        import tempfile
        import urllib.request
        import urllib.error
        import json
        import base64

        rt_repo_url = os.environ["RT_REPO_URL"].rstrip("/")
        rt_token    = os.environ.get("RT_TOKEN", "").strip()
        rt_username = os.environ.get("RT_USERNAME", "").strip()
        rt_password = os.environ.get("RT_PASSWORD", "").strip()
        gh_token    = os.environ["GH_TOKEN"]
        output_dir  = os.environ["OUTPUT_DIR"]
        actions_raw = os.environ["ACTIONS_LIST"]

        # Build Artifactory Authorization header —
        # Bearer token takes precedence over Basic auth.
        if rt_token:
            rt_auth_header = f"Bearer {rt_token}"
        elif rt_username and rt_password:
            encoded = base64.b64encode(f"{rt_username}:{rt_password}".encode()).decode()
            rt_auth_header = f"Basic {encoded}"
        else:
            print("::error::Provide either rt-token or both rt-username and rt-password.")
            sys.exit(1)

        actions = [a.strip() for a in actions_raw.splitlines() if a.strip()]
        if not actions:
            print("::error::No actions provided in the 'actions' input.")
            sys.exit(1)

        def gh_api(path):
            """Call the GitHub API and return the parsed JSON response."""
            url = f"https://api.github.com{path}"
            req = urllib.request.Request(url, headers={
                "Authorization": f"Bearer {gh_token}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
            })
            try:
                with urllib.request.urlopen(req) as resp:
                    return json.loads(resp.read())
            except urllib.error.HTTPError as e:
                body = e.read().decode()
                print(f"::error::GitHub API {url} returned {e.code}: {body}")
                raise

        def resolve_sha(owner, repo, ref):
            """
            Resolve a branch, tag, or full SHA to a commit SHA.
            Tries commits endpoint first (works for branches and full SHAs),
            then falls back to the git refs endpoint for tags.
            """
            try:
                data = gh_api(f"/repos/{owner}/{repo}/commits/{ref}")
                return data["sha"]
            except urllib.error.HTTPError:
                pass

            # Fallback: look up an annotated or lightweight tag via git/ref
            data = gh_api(f"/repos/{owner}/{repo}/git/ref/tags/{ref}")
            obj = data["object"]
            if obj["type"] == "tag":
                # Annotated tag — dereference to the commit
                tag_data = gh_api(f"/repos/{owner}/{repo}/git/tags/{obj['sha']}")
                return tag_data["object"]["sha"]
            return obj["sha"]

        def download_archive(owner, repo, sha, dest_file):
            """
            Download the action archive from Artifactory.
            Artifactory proxies codeload.github.com, so the path mirrors:
              https://codeload.github.com/{owner}/{repo}/tar.gz/{sha}
            """
            url = f"{rt_repo_url}/{owner}/{repo}/tar.gz/{sha}"
            req = urllib.request.Request(url, headers={
                "Authorization": rt_auth_header,
            })
            print(f"  Downloading: {url}")
            try:
                with urllib.request.urlopen(req) as resp, open(dest_file, "wb") as f:
                    while chunk := resp.read(65536):
                        f.write(chunk)
            except urllib.error.HTTPError as e:
                body = e.read().decode()
                print(f"::error::Artifactory {url} returned {e.code}: {body}")
                raise

        def extract_archive(tar_path, target_dir):
            """
            Extract the tar.gz archive.
            GitHub archives contain a top-level directory named {repo}-{sha}/,
            so we strip that prefix when extracting.
            """
            os.makedirs(target_dir, exist_ok=True)
            with tarfile.open(tar_path, "r:gz") as tf:
                members = tf.getmembers()
                # Identify the common prefix (e.g. pr-agent-abc123/)
                prefix = members[0].name.split("/")[0] if members else ""
                for member in members:
                    # Strip the top-level directory from every member path
                    rel = member.name[len(prefix):].lstrip("/")
                    if not rel:
                        continue
                    member.name = rel
                    tf.extract(member, path=target_dir)

        errors = []
        abs_output = os.path.abspath(output_dir)

        for action_ref in actions:
            if "@" not in action_ref:
                print(f"::warning::Skipping '{action_ref}' — must be owner/repo@ref")
                continue

            repo_part, ref = action_ref.rsplit("@", 1)
            parts = repo_part.split("/")
            if len(parts) != 2:
                print(f"::warning::Skipping '{action_ref}' — expected owner/repo@ref")
                continue

            owner, repo = parts
            print(f"\n:: Prefetching {owner}/{repo}@{ref}")

            try:
                sha = resolve_sha(owner, repo, ref)
                print(f"  Resolved {ref} → {sha}")

                local_path = os.path.join(abs_output, owner, f"{repo}@{ref}")

                if os.path.isdir(local_path):
                    print(f"  Already present at {local_path}, skipping download.")
                    continue

                with tempfile.NamedTemporaryFile(suffix=".tar.gz", delete=False) as tmp:
                    tmp_path = tmp.name

                try:
                    download_archive(owner, repo, sha, tmp_path)
                    extract_archive(tmp_path, local_path)
                    print(f"  Extracted to {local_path}")
                finally:
                    os.unlink(tmp_path)

            except Exception as exc:
                errors.append(f"{action_ref}: {exc}")
                print(f"::error::Failed to fetch {action_ref}: {exc}")

        if errors:
            print("\n::error::The following actions could not be fetched:")
            for e in errors:
                print(f"  - {e}")
            sys.exit(1)

        print(f"\n✓ All actions written to {abs_output}")

        github_output = os.environ.get("GITHUB_OUTPUT", "")
        if github_output:
            with open(github_output, "a") as f:
                f.write(f"output-dir={abs_output}\n")

name: "Setup Environment"
description: >
  Level-2 composite action. Caches dependencies and delegates
  tool installation to the nested install-tools action.

inputs:
  node-version:
    description: "Node.js version to install"
    required: false
    default: "20"
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"
  cache-key:
    description: "Cache key prefix"
    required: false
    default: "env"

runs:
  using: "composite"
  steps:
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.npm
          ~/.cache/pip
        key: ${{ inputs.cache-key }}-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          ${{ inputs.cache-key }}-${{ runner.os }}-

    - name: Install tools (nested composite)
      uses: ./.github/actions/install-tools
      with:
        node-version: ${{ inputs.node-version }}
        python-version: ${{ inputs.python-version }}

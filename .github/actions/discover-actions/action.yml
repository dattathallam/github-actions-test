name: "Discover Actions"
description: >
  Recursively parses a workflow file and all composite action files it
  references (directly or transitively) to produce a deduplicated list
  of every third-party action (owner/repo@ref) in the dependency tree.

inputs:
  workflow-file:
    description: "Relative path to the workflow YAML file to scan (e.g. .github/workflows/my-workflow.yml)"
    required: true

outputs:
  actions:
    description: "Newline-separated, sorted list of discovered third-party actions"
    value: ${{ steps.discover.outputs.actions }}
  sources:
    description: "Newline-separated list of 'action=source-file' pairs showing where each action was found"
    value: ${{ steps.discover.outputs.sources }}

runs:
  using: "composite"
  steps:
    - name: Discover all action references
      id: discover
      shell: python3 {0}
      env:
        WORKFLOW_FILE: ${{ inputs.workflow-file }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        GITHUB_OUTPUT: ${{ env.GITHUB_OUTPUT }}
      run: |
        import os
        import re
        import sys
        from pathlib import Path

        workspace   = Path(os.environ["GITHUB_WORKSPACE"])
        start_file  = workspace / os.environ["WORKFLOW_FILE"]
        output_file = os.environ.get("GITHUB_OUTPUT", "")

        # Matches any "uses: <value>" line, regardless of indentation.
        USES_RE = re.compile(r'^\s+uses:\s+["\']?([^\s"\'#]+)["\']?', re.MULTILINE)

        # Maps ref → relative source file path (first file it was found in)
        discovered = {}
        visited    = set()   # absolute paths already parsed

        def parse(path: Path):
            path = path.resolve()
            if path in visited:
                return
            visited.add(path)

            if not path.exists():
                print(f"  [warn] file not found, skipping: {path}", file=sys.stderr)
                return

            rel = path.relative_to(workspace)
            text = path.read_text()
            print(f"  Scanning: {rel}")

            for ref in USES_RE.findall(text):
                ref = ref.strip()

                if ref.startswith("./"):
                    # Strip exactly the "./" prefix (lstrip would also eat ".github")
                    local_path = workspace / ref[2:]

                    if local_path.suffix in (".yml", ".yaml"):
                        # Reusable workflow file — parse it directly
                        parse(local_path)
                    else:
                        # Composite action directory — look for action.yml inside
                        for candidate in ("action.yml", "action.yaml"):
                            candidate_path = local_path / candidate
                            if candidate_path.exists():
                                parse(candidate_path)
                                break
                        else:
                            print(f"  [warn] local action not found: {ref}", file=sys.stderr)

                elif "/" in ref and "@" in ref:
                    # Third-party action: owner/repo@ref — record ref + source file
                    if ref not in discovered:
                        discovered[ref] = str(rel)

        print(f"\nStarting discovery from: {os.environ['WORKFLOW_FILE']}\n")
        parse(start_file)

        sorted_actions = sorted(discovered)

        print(f"\nDiscovered {len(sorted_actions)} third-party action(s):")
        for a in sorted_actions:
            print(f"  - {a}  [found in: {discovered[a]}]")

        if output_file:
            with open(output_file, "a") as f:
                # actions output: sorted newline-separated refs
                f.write("actions<<EOF\n")
                f.write("\n".join(sorted_actions))
                f.write("\nEOF\n")
                # sources output: action=source-file pairs for assertion
                f.write("sources<<EOF\n")
                for a in sorted_actions:
                    f.write(f"{a}={discovered[a]}\n")
                f.write("EOF\n")

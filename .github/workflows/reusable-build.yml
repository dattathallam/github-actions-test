name: Reusable Build

# Called by workflow-nested-discovery.yml via jobs.<id>.uses.
# Contains its own third-party action reference (upload-artifact)
# that the recursive parser must discover.

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build artifact
        run: echo "build output from reusable workflow" > artifact.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifact.txt

name: workflow-with-artifactory-actions

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: self-hosted
    steps:

      # Promote runner machine env vars into the workflow env context
      # so they are accessible via ${{ env.* }} in all subsequent with: blocks.
      # Set RT_USERNAME, RT_PASSWORD, GH_PAT in the runner's shell environment
      # (e.g. ~/.profile, /etc/environment, or the runner's .env file).
      - name: Load credentials from runner environment
        run: |
          echo "RT_USERNAME=$RT_USERNAME" >> "$GITHUB_ENV"
          echo "RT_PASSWORD=$RT_PASSWORD" >> "$GITHUB_ENV"
          echo "GH_PAT=$GH_PAT"          >> "$GITHUB_ENV"

      # Checkout using raw git — no action download needed, works fully offline
      - name: Checkout repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Disable osxkeychain so it doesn't intercept and abort the request
          git config --global credential.helper ""
          git config --global "http.${GITHUB_SERVER_URL}/.extraheader" "Authorization: token ${GH_PAT}"
          GIT_TERMINAL_PROMPT=0 git -C "$GITHUB_WORKSPACE" fetch origin "$GITHUB_SHA"
          git -C "$GITHUB_WORKSPACE" checkout "$GITHUB_SHA"

      # Prefetch all OSS actions through Artifactory and write to ./jfrog-proxy/
      - name: Prefetch actions from Artifactory
        id: prefetch
        uses: ./.github/actions/fetch-actions-from-artifactory
        with:
          rt-repo-url:  https://localhost:8083/artifactory/gh-actions/
          rt-username:  ${{ env.RT_USERNAME }}
          rt-password:  ${{ env.RT_PASSWORD }}
          gh-token:     ${{ env.GH_PAT }}
          actions: |
            the-pr-agent/pr-agent@v1
            actions/setup-python@v5

      # All steps below use LOCAL paths — resolved from ./jfrog-proxy/ on the runner
      - name: Set up Python
        uses: ./jfrog-proxy/actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run PR Agent
        uses: ./jfrog-proxy/the-pr-agent/pr-agent@v1
        with:
          openai_key: ${{ secrets.OPENAI_KEY }}

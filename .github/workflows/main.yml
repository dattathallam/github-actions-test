# Main workflow — demonstrates Approach 2 (reusable workflow as centralized gate)
#
# Job graph:
#   notify  →  build
#
# The notify job parses this workflow file, extracts all third-party actions,
# and POSTs them to a webhook. The build job only runs if notify succeeds.
# Any failure in parsing or the webhook call stops build from executing.

name: Main

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Gate: parse and report all third-party actions used in this workflow before
  # any downstream jobs run. Fails fast if the webhook call fails.
  notify:
    uses: ./.github/workflows/notify-webhook.yml
    with:
      workflow-file: .github/workflows/main.yml

  # Downstream job — only runs when notify succeeds.
  # Uses third-party actions intentionally so the parser has something to detect.
  build:
    needs: notify
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run build script
        run: python3 -c "print('build complete')"

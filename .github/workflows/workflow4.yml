name: Security Scan

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - name: Configure tool cache path
        run: echo "RUNNER_TOOL_CACHE=$HOME/hostedtoolcache" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: "*.log"
          if-no-files-found: ignore

      - name: Run scan
        run: echo "security scan complete"

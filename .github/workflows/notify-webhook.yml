# Reusable notifier workflow — centralized gate (Approach 2)
#
# Parses the calling workflow file, extracts all third-party `uses:` references,
# and POSTs the structured list to a webhook before any downstream jobs run.
#
# Usage in a caller workflow:
#   jobs:
#     notify:
#       uses: ./.github/workflows/notify-webhook.yml
#       with:
#         workflow-file: .github/workflows/main.yml

name: Notify Webhook (Reusable)

on:
  workflow_call:
    inputs:
      workflow-file:
        description: "Repo-relative path to the calling workflow file (e.g. .github/workflows/main.yml)"
        required: true
        type: string
      webhook-url:
        description: "HTTP endpoint to POST the extracted actions list to"
        required: false
        type: string
        default: "https://webhook.site/#!/edit/10cf7893-ea3c-4e9c-ad2e-bc455cef7680"

jobs:
  notify:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Parse third-party actions from workflow file
        id: parse
        shell: python3 {0}
        run: |
          import json
          import sys
          import yaml
          import os

          workflow_path = "${{ inputs.workflow-file }}"

          if not os.path.isfile(workflow_path):
              print(f"ERROR: workflow file not found: {workflow_path}", file=sys.stderr)
              sys.exit(1)

          with open(workflow_path) as f:
              workflow = yaml.safe_load(f)

          actions = []
          jobs = workflow.get("jobs", {})

          for job_name, job in jobs.items():
              if not isinstance(job, dict):
                  continue

              # Reusable workflow call at the job level (uses: org/repo/.github/workflows/x.yml@ref)
              if "uses" in job:
                  ref = job["uses"]
                  if not ref.startswith("./") and not ref.startswith(".\\"):
                      actions.append({
                          "job": job_name,
                          "step": None,
                          "uses": ref,
                          "type": "reusable_workflow",
                      })

              # Step-level action references
              for step in job.get("steps", []):
                  if not isinstance(step, dict) or "uses" not in step:
                      continue
                  ref = step["uses"]
                  if not ref.startswith("./") and not ref.startswith(".\\"):
                      actions.append({
                          "job": job_name,
                          "step": step.get("name") or ref,
                          "uses": ref,
                          "type": "action",
                      })

          actions_json = json.dumps(actions)
          print(f"Found {len(actions)} third-party action(s):")
          print(json.dumps(actions, indent=2))

          # Write to GITHUB_OUTPUT — value must be on one line
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"actions_json={actions_json}\n")
              out.write(f"action_count={len(actions)}\n")

      - name: POST actions list to webhook
        shell: bash
        env:
          WEBHOOK_URL: ${{ inputs.webhook-url }}
          ACTIONS_JSON: ${{ steps.parse.outputs.actions_json }}
        run: |
          PAYLOAD=$(jq -n \
            --arg  repository    "$GITHUB_REPOSITORY" \
            --arg  run_id        "$GITHUB_RUN_ID" \
            --arg  triggered_by  "$GITHUB_EVENT_NAME" \
            --arg  workflow_file "${{ inputs.workflow-file }}" \
            --argjson third_party_actions "$ACTIONS_JSON" \
            '{
              repository:           $repository,
              run_id:               $run_id,
              triggered_by:         $triggered_by,
              workflow_file:        $workflow_file,
              third_party_actions:  $third_party_actions
            }')

          echo "Posting to: $WEBHOOK_URL"
          echo "Payload:"
          echo "$PAYLOAD" | jq .

          # --fail: exit non-zero on HTTP 4xx/5xx so the gate blocks downstream jobs
          HTTP_STATUS=$(curl \
            --silent \
            --show-error \
            --fail \
            --write-out "%{http_code}" \
            --output /tmp/webhook_response.txt \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/webhook_response.txt

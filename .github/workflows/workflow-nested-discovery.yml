name: nested-action-discovery

# Tests that a recursive YAML parser can discover ALL third-party action
# references across both composite actions and reusable workflows:
#
#   workflow
#     ├── job: discover-and-run
#     │     └── setup-env          (level-2 composite)
#     │           ├── actions/cache@v4
#     │           └── install-tools  (level-3 composite)
#     │                 ├── actions/setup-node@v4
#     │                 └── actions/setup-python@v5
#     └── job: build
#           └── reusable-build.yml  (reusable workflow)
#                 ├── actions/checkout@v4
#                 └── actions/upload-artifact@v4
#
# The discover-actions step must find all refs by recursively following
# both local action directories and local reusable workflow files.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-and-run:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # DISCOVERY: recursively parse this workflow file and all composite
      # actions it references to build the full third-party action manifest.
      - name: "DISCOVER: find all nested action references"
        id: discovery
        uses: ./.github/actions/discover-actions
        with:
          workflow-file: .github/workflows/workflow-nested-discovery.yml

      # ASSERT: verify each action was found AND came from the expected source file.
      # This proves the parser actually traversed local refs — not just the root workflow.
      - name: "ASSERT: verify actions were found inside the correct local files"
        env:
          SOURCES: ${{ steps.discovery.outputs.sources }}
        run: |
          echo "=== action=source-file pairs ==="
          echo "$SOURCES"
          echo ""

          # Format: "action=expected-source-file"
          # Checking source file proves the parser entered the local file to find it.
          declare -A EXPECTED
          EXPECTED["actions/cache@v4"]=".github/actions/setup-env/action.yml"
          EXPECTED["actions/setup-node@v4"]=".github/actions/install-tools/action.yml"
          EXPECTED["actions/setup-python@v5"]=".github/actions/install-tools/action.yml"
          EXPECTED["actions/upload-artifact@v4"]=".github/workflows/reusable-build.yml"

          ALL_PASS=true
          for action in "${!EXPECTED[@]}"; do
            expected_src="${EXPECTED[$action]}"
            actual_line=$(echo "$SOURCES" | grep -F "${action}=")

            if [ -z "$actual_line" ]; then
              echo "FAIL [not found]:       $action"
              ALL_PASS=false
            elif echo "$actual_line" | grep -qF "$expected_src"; then
              echo "PASS [correct source]:  $action  →  $expected_src"
            else
              actual_src="${actual_line#*=}"
              echo "FAIL [wrong source]:    $action  →  got '$actual_src', want '$expected_src'"
              ALL_PASS=false
            fi
          done

          echo ""
          if [ "$ALL_PASS" = true ]; then
            echo "All actions discovered from the expected local files."
            echo "Parser correctly traversed: composite actions AND reusable workflow."
          else
            echo "One or more actions were missing or found in the wrong file."
            exit 1
          fi

      # RUN: execute the actual composite chain to prove it works end-to-end.
      - name: "RUN: execute setup-env (level-2 composite → level-3 composite)"
        uses: ./.github/actions/setup-env
        with:
          node-version: "20"
          python-version: "3.11"
          cache-key: "nested-test"

      # VERIFY: confirm all tools installed by the composite chain are active.
      - name: "VERIFY: tools installed by nested composites are available"
        run: |
          echo "node:   $(node --version)"
          echo "python: $(python3 --version)"
          echo "npm:    $(npm --version)"
          echo "pip:    $(pip3 --version)"

  # Separate job that calls the reusable workflow.
  # The parser must follow this job-level `uses:` into reusable-build.yml
  # and discover actions/checkout@v4 and actions/upload-artifact@v4 there.
  build:
    uses: ./.github/workflows/reusable-build.yml
